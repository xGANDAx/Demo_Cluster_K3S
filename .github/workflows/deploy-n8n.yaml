name: Deploy N8N

on:
  workflow_dispatch

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy namespace
        run: |
          kubectl apply -f n8n/manifests/namespace.yaml

      - name: Deploy Secrets
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: n8n
        run: |
          chmod +x n8n/secrets.sh
          ./n8n/secrets.sh

      - name: Deploy Certificate
        env:
          TLS_CERT: ${{ secrets.TLS_CERT_N8N }}
          TLS_KEY: ${{ secrets.TLS_KEY_N8N }}
        run: |
          chmod +x openclaw/cert.sh
          ./openclaw/cert.sh --create-secret

      - name: Deploy Components
        run: |
          chmod +x n8n/deploy.sh
          cd n8n
          ./deploy.sh

      - name: Verify deployment
        run: |
          kubectl get pods -n n8n